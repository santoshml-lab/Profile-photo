
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Insta Pro AI Feed</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0f1a;
  color:white;
}

/* TOP BAR */
header{
  text-align:center;
  padding:12px;
  font-size:18px;
  color:#38bdf8;
  font-weight:bold;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

/* STORY BAR */
.stories{
  display:flex;
  gap:10px;
  padding:10px;
  overflow-x:auto;
}

.story{
  min-width:60px;
  height:60px;
  border-radius:50%;
  border:2px solid #38bdf8;
}

/* FEED */
.feed{
  max-width:500px;
  margin:auto;
  padding:10px;
}

/* POST */
.post{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:18px;
  margin-bottom:15px;
  overflow:hidden;
}

/* IMAGE */
.post img{
  width:100%;
  height:320px;
  object-fit:cover;
}

/* CONTENT */
.post-content{
  padding:12px;
  display:flex;
  flex-direction:column;
  gap:6px;
}

.title{
  color:#38bdf8;
  font-weight:bold;
}

.text{
  font-size:13px;
  opacity:0.85;
  line-height:1.4;
}

/* ACTIONS */
.actions{
  padding:10px 12px;
  display:flex;
  justify-content:space-between;
  font-size:14px;
}

/* INPUT BOX */
.create{
  position:sticky;
  bottom:0;
  background:#0b0f1a;
  padding:10px;
  border-top:1px solid rgba(255,255,255,0.1);
}

input, textarea{
  width:100%;
  margin:5px 0;
  padding:10px;
  border-radius:10px;
  border:none;
}

button{
  width:100%;
  padding:10px;
  background:#38bdf8;
  border:none;
  border-radius:10px;
  font-weight:bold;
}
</style>

</head>

<body>

<header>📱 Insta AI Feed Pro</header>

<!-- STORIES -->
<div class="stories">
  <img class="story" src="https://i.ibb.co/W42fL9cB/IMG-20260224-WA0001.jpg">
  <img class="story" src="https://i.ibb.co/W42fL9cB/IMG-20260224-WA0001.jpg">
  <img class="story" src="https://i.ibb.co/W42fL9cB/IMG-20260224-WA0001.jpg">
</div>

<!-- FEED -->
<div class="feed" id="feed"></div>

<!-- CREATE -->
<div class="create">
  <input id="title" placeholder="Title"/>
  <textarea id="content" placeholder="Write something..."></textarea>
  <input id="image" placeholder="Image URL"/>
  <button onclick="addPost()">Post</button>
</div>

<script>

let posts = JSON.parse(localStorage.getItem("posts")) || [
  {
    title:"🔥 My AI Journey Moment",
    content:"Built my first AI app step by step 🚀",
    image:"https://i.ibb.co/W42fL9cB/IMG-20260224-WA0001.jpg"
  }
];

function render(){

  let feed = document.getElementById("feed");
  feed.innerHTML = "";

  posts.forEach(p => {

    feed.innerHTML += `
      <div class="post">

        <img src="${p.image}" />

        <div class="post-content">
          <div class="title">${p.title}</div>
          <div class="text">${p.content}</div>
        </div>

        <div class="actions">
          <div>❤️ Like</div>
          <div>💬 Comment</div>
          <div>🔖 Save</div>
        </div>

      </div>
    `;

  });

}

function addPost(){

  let t = document.getElementById("title").value.trim();
  let c = document.getElementById("content").value.trim();
  let i = document.getElementById("image").value.trim();

  if(!t || !c) return;

  posts.unshift({title:t, content:c, image:i});

  localStorage.setItem("posts", JSON.stringify(posts));

  document.getElementById("title").value="";
  document.getElementById("content").value="";
  document.getElementById("image").value="";

  render();
}

render();

</script>

</body>
</html>
