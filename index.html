<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Insta Feed</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0a0f1c;
  color:white;
}

/* HEADER */
header{
  text-align:center;
  padding:14px;
  font-size:20px;
  color:#38bdf8;
  font-weight:bold;
}

/* APP LAYOUT */
.container{
  max-width:500px;
  margin:auto;
  padding:10px;
}

/* POST CARD */
.post{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:18px;
  margin-bottom:15px;
  overflow:hidden;
  animation:fadeIn 0.4s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

/* IMAGE */
.post img{
  width:100%;
  height:320px;
  object-fit:cover;
  cursor:pointer;
}

/* TEXT */
.post-content{
  padding:12px;
}

.title{
  color:#38bdf8;
  font-size:15px;
  margin-bottom:5px;
}

.text{
  font-size:13px;
  opacity:0.85;
}

/* LIKE BUTTON */
.actions{
  display:flex;
  justify-content:space-between;
  padding:10px 12px;
}

.like{
  cursor:pointer;
  font-size:14px;
  user-select:none;
}

.like span{
  color:#ff4d6d;
}

/* INPUT AREA */
.create{
  position:sticky;
  bottom:0;
  background:#0a0f1c;
  padding:10px;
  border-top:1px solid rgba(255,255,255,0.1);
}

input, textarea{
  width:100%;
  margin:5px 0;
  padding:10px;
  border-radius:10px;
  border:none;
  outline:none;
}

button{
  width:100%;
  padding:10px;
  background:#38bdf8;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

/* LIGHTBOX */
.lightbox{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.85);
  display:none;
  justify-content:center;
  align-items:center;
}

.lightbox img{
  max-width:90%;
  max-height:90%;
  border-radius:12px;
}
</style>

</head>

<body>

<header>📱 AI Insta Feed</header>

<div class="container" id="feed"></div>

<!-- CREATE POST -->
<div class="create">
  <input id="title" placeholder="Title"/>
  <textarea id="content" placeholder="Write something..."></textarea>
  <input id="image" placeholder="Image URL"/>

  <button onclick="addPost()">Post</button>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeImg()">
  <img id="bigimg">
</div>

<script>

let posts = JSON.parse(localStorage.getItem("posts")) || [
  {
    title:"🔥 My AI Journey Moment",
    content:"Started building AI apps step by step 🚀",
    image:"https://i.ibb.co/W42fL9cB/IMG-20260224-WA0001.jpg",
    likes: 12
  }
];

function render(){

  let feed = document.getElementById("feed");
  feed.innerHTML = "";

  posts.forEach((p, i)=>{

    feed.innerHTML += `
      <div class="post">

        <img src="${p.image}" onclick="openImg(this.src)" />

        <div class="post-content">
          <div class="title">${p.title}</div>
          <div class="text">${p.content}</div>
        </div>

        <div class="actions">
          <div class="like" onclick="likePost(${i})">
            ❤️ <span>${p.likes || 0}</span>
          </div>
        </div>

      </div>
    `;

  });

  localStorage.setItem("posts", JSON.stringify(posts));
}

/* ADD POST */
function addPost(){

  let t = document.getElementById("title").value.trim();
  let c = document.getElementById("content").value.trim();
  let i = document.getElementById("image").value.trim();

  if(!t || !c) return;

  posts.unshift({
    title:t,
    content:c,
    image:i,
    likes:0
  });

  document.getElementById("title").value="";
  document.getElementById("content").value="";
  document.getElementById("image").value="";

  render();
}

/* LIKE */
function likePost(index){
  posts[index].likes = (posts[index].likes || 0) + 1;
  render();
}

/* IMAGE ZOOM */
function openImg(src){
  document.getElementById("lightbox").style.display="flex";
  document.getElementById("bigimg").src=src;
}

function closeImg(){
  document.getElementById("lightbox").style.display="none";
}

render();

</script>

</body>
</html>
