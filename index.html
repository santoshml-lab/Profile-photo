<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Multi Image Feed</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
}

/* HEADER */
header{
  text-align:center;
  padding:15px;
  color:#38bdf8;
  font-size:20px;
  font-weight:bold;
}

/* FEED */
.container{
  max-width:500px;
  margin:auto;
  padding:10px;
}

/* POST CARD */
.post{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:18px;
  overflow:hidden;
  margin-bottom:15px;
}

/* IMAGE SCROLL (CAROUSEL) */
.images{
  display:flex;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
}

.images img{
  width:100%;
  flex:0 0 100%;
  height:300px;
  object-fit:cover;
  scroll-snap-align:start;
}

/* CONTENT */
.post-content{
  padding:12px;
}

.post-title{
  color:#38bdf8;
  font-size:16px;
  font-weight:bold;
}

.post-text{
  font-size:13px;
  opacity:0.85;
  margin-top:5px;
}

/* INPUT */
.create{
  position:sticky;
  bottom:0;
  background:#0b1220;
  padding:10px;
  border-top:1px solid rgba(255,255,255,0.1);
}

input, textarea{
  width:100%;
  margin:5px 0;
  padding:10px;
  border-radius:10px;
  border:none;
  outline:none;
}

button{
  width:100%;
  padding:10px;
  background:#38bdf8;
  border:none;
  border-radius:10px;
  font-weight:bold;
}
</style>

</head>

<body>

<header>📱 Multi Image Feed Pro</header>

<div class="container" id="feed"></div>

<div class="create">
  <input id="title" placeholder="Title"/>
  <textarea id="content" placeholder="Content"></textarea>
  <input id="images" placeholder="Image URLs (comma separated)"/>
  <button onclick="addPost()">Post</button>
</div>

<script>

let posts = JSON.parse(localStorage.getItem("posts")) || [
  {
    title:"🔥 My AI Journey",
    content:"Multiple images demo post 🚀",
    images:[
      "https://i.ibb.co/W42fL9cB/IMG-20260224-WA0001.jpg",
      "https://picsum.photos/500/300",
      "https://picsum.photos/501/300"
    ]
  }
];

function render(){

  let feed = document.getElementById("feed");
  feed.innerHTML = "";

  posts.forEach(p => {

    let imgs = "";

    p.images.forEach(img => {
      imgs += `<img src="${img}" />`;
    });

    feed.innerHTML += `
      <div class="post">

        <div class="images">
          ${imgs}
        </div>

        <div class="post-content">
          <div class="post-title">${p.title}</div>
          <div class="post-text">${p.content}</div>
        </div>

      </div>
    `;

  });

}

function addPost(){

  let t = document.getElementById("title").value;
  let c = document.getElementById("content").value;
  let i = document.getElementById("images").value;

  if(!t || !c || !i) return;

  let imgArray = i.split(",");

  posts.unshift({
    title:t,
    content:c,
    images:imgArray
  });

  localStorage.setItem("posts", JSON.stringify(posts));

  document.getElementById("title").value="";
  document.getElementById("content").value="";
  document.getElementById("images").value="";

  render();
}

render();

</script>

</body>
</html>
