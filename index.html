<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Startup Blog</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, onSnapshot, query, orderBy } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* 🔥 YOUR FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "XXXX",
  appId: "XXXX"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let postsDiv = document.getElementById("posts");

/* =======================
   LIVE RENDER
======================= */

function renderPosts(){

  const q = query(collection(db, "posts"), orderBy("time","desc"));

  onSnapshot(q, (snapshot)=>{

    postsDiv.innerHTML = "";

    snapshot.forEach((doc)=>{

      let p = doc.data();

      postsDiv.innerHTML += `
        <div class="card">
          ${p.image ? `<img src="${p.image}" onclick="openImg(this.src)" />` : ""}
          <h3>${p.title}</h3>
          <p>${p.content}</p>
        </div>
      `;

    });

  });

}

/* =======================
   ADD POST
======================= */

window.addPost = async function(){

  let title = document.getElementById("title").value;
  let content = document.getElementById("content").value;
  let image = document.getElementById("image").value;

  if(!title || !content) return;

  await addDoc(collection(db, "posts"), {
    title,
    content,
    image,
    time: Date.now()
  });

  document.getElementById("title").value = "";
  document.getElementById("content").value = "";
  document.getElementById("image").value = "";
}

/* =======================
   IMAGE ZOOM
======================= */

window.openImg = function(src){
  document.getElementById("lightbox").style.display = "flex";
  document.getElementById("bigimg").src = src;
}

window.closeImg = function(){
  document.getElementById("lightbox").style.display = "none";
}

renderPosts();

</script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

header{
  text-align:center;
  padding:20px;
  color:#38bdf8;
}

.container{
  display:grid;
  grid-template-columns:1fr 2fr;
  gap:20px;
  padding:20px;
}

.sidebar{
  background:rgba(255,255,255,0.05);
  padding:15px;
  border-radius:12px;
}

input, textarea{
  width:100%;
  margin:8px 0;
  padding:10px;
  border-radius:8px;
  border:none;
}

button{
  width:100%;
  padding:10px;
  background:#38bdf8;
  border:none;
  border-radius:8px;
  font-weight:bold;
}

.posts{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
}

.card{
  background:rgba(255,255,255,0.05);
  padding:10px;
  border-radius:12px;
}

.card img{
  width:100%;
  border-radius:10px;
  cursor:pointer;
}

.lightbox{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  display:none;
  justify-content:center;
  align-items:center;
}

.lightbox img{
  max-width:90%;
}
</style>

</head>

<body>

<header>
  <h1>🚀 Startup AI Blog</h1>
</header>

<div class="container">

<div class="sidebar">
  <input id="title" placeholder="Title"/>
  <textarea id="content" placeholder="Content"></textarea>
  <input id="image" placeholder="Image URL"/>
  <button onclick="addPost()">Publish</button>
</div>

<div id="posts" class="posts"></div>

</div>

<div class="lightbox" id="lightbox" onclick="closeImg()">
  <img id="bigimg">
</div>

</body>
</html>
