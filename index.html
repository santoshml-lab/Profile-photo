<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Viral AI Feed</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background: radial-gradient(circle at top, #1e293b, #0b1220);
  color:white;
}

/* HEADER */
header{
  text-align:center;
  padding:15px;
  font-size:20px;
  font-weight:bold;
  color:#38bdf8;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

/* FEED */
.container{
  max-width:520px;
  margin:auto;
  padding:12px;
}

/* VIRAL CARD */
.post{
  background:linear-gradient(145deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
  border:1px solid rgba(56,189,248,0.25);
  border-radius:20px;
  overflow:hidden;
  margin-bottom:18px;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
  transition:0.3s;
}

.post:hover{
  transform:translateY(-6px) scale(1.02);
}

/* IMAGE */
.post img{
  width:100%;
  height:320px;
  object-fit:cover;
  display:block;
}

/* CONTENT */
.post-content{
  padding:14px;
}

.post-title{
  font-size:18px;
  font-weight:700;
  color:#7dd3fc;
  margin-bottom:6px;
}

.post-text{
  font-size:13px;
  opacity:0.9;
  line-height:1.4;
}

/* CREATE BOX */
.create{
  position:sticky;
  bottom:0;
  background:#0b1220;
  padding:10px;
  border-top:1px solid rgba(255,255,255,0.1);
}

input, textarea{
  width:100%;
  margin:5px 0;
  padding:10px;
  border-radius:10px;
  border:none;
  outline:none;
}

button{
  width:100%;
  padding:10px;
  background:#38bdf8;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#0ea5e9;
}
</style>

</head>

<body>

<header>🚀 Viral AI Feed (Scroll Stopping Mode)</header>

<div class="container" id="feed"></div>

<div class="create">
  <input id="title" placeholder="Write title (make it viral)"/>
  <textarea id="content" placeholder="Write content..."></textarea>
  <input id="image" placeholder="Image URL"/>
  <button onclick="addPost()">Post 🚀</button>
</div>

<script>

let posts = JSON.parse(localStorage.getItem("posts")) || [
  {
    title:"🚀 I Built an AI That Feels Like a Teacher",
    content:"This project changed how I understand coding forever.",
    image:"https://i.ibb.co/W42fL9cB/IMG-20260224-WA0001.jpg"
  }
];

function render(){

  let feed = document.getElementById("feed");
  feed.innerHTML = "";

  posts.forEach(p => {

    feed.innerHTML += `
      <div class="post">

        <img src="${p.image}" />

        <div class="post-content">
          <div class="post-title">⚡ ${p.title}</div>
          <div class="post-text">${p.content}</div>
        </div>

      </div>
    `;

  });

}

function addPost(){

  let t = document.getElementById("title").value.trim();
  let c = document.getElementById("content").value.trim();
  let i = document.getElementById("image").value.trim();

  if(!t || !c) return;

  posts.unshift({
    title:t,
    content:c,
    image:i
  });

  localStorage.setItem("posts", JSON.stringify(posts));

  document.getElementById("title").value="";
  document.getElementById("content").value="";
  document.getElementById("image").value="";

  render();
}

render();

</script>

</body>
</html>
