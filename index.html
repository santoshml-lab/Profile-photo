<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Feed App</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
}

/* HEADER */
header{
  text-align:center;
  padding:15px;
  color:#38bdf8;
  font-size:22px;
  font-weight:bold;
}

/* MAIN LAYOUT */
.container{
  display:grid;
  grid-template-columns:1fr 2fr;
  gap:20px;
  padding:20px;
}

/* SIDEBAR */
.sidebar{
  background:rgba(255,255,255,0.05);
  padding:15px;
  border-radius:16px;
  position:sticky;
  top:10px;
  height:fit-content;
}

input, textarea{
  width:100%;
  margin:8px 0;
  padding:10px;
  border-radius:10px;
  border:none;
  outline:none;
}

button{
  width:100%;
  padding:10px;
  background:#38bdf8;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

/* FEED */
.feed{
  display:flex;
  flex-direction:column;
  gap:15px;
}

/* POST CARD (INSTAGRAM STYLE) */
.post{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:18px;
  overflow:hidden;
  transition:0.3s;
}

.post:hover{
  transform:scale(1.01);
}

/* IMAGE */
.post img{
  width:100%;
  height:300px;
  object-fit:cover;
  cursor:pointer;
}

/* CONTENT */
.post-content{
  padding:12px;
}

.post-title{
  font-size:16px;
  color:#38bdf8;
  margin-bottom:5px;
}

.post-text{
  font-size:13px;
  opacity:0.85;
}

/* LIGHTBOX */
.lightbox{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.85);
  display:none;
  justify-content:center;
  align-items:center;
}

.lightbox img{
  max-width:90%;
  max-height:90%;
  border-radius:12px;
}
</style>

</head>

<body>

<header>🚀 AI Feed (Instagram Style)</header>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
  <input id="title" placeholder="Title"/>
  <textarea id="content" placeholder="Write something..."></textarea>
  <input id="image" placeholder="Image URL"/>
  <button onclick="addPost()">Post</button>
</div>

<!-- FEED -->
<div class="feed" id="feed"></div>

</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeImg()">
  <img id="bigimg">
</div>

<script>

let posts = JSON.parse(localStorage.getItem("posts")) || [
  {
    title:"My First AI Project 🚀",
    content:"Built an AI evaluator using FastAPI + Groq",
    image:"https://i.ibb.co/W42fL9cB/IMG-20260224-WA0001.jpg"
  }
];

function render(){

  let feed = document.getElementById("feed");
  feed.innerHTML = "";

  posts.forEach(p => {

    feed.innerHTML += `
      <div class="post">

        <img src="${p.image}" onclick="openImg(this.src)" />

        <div class="post-content">
          <div class="post-title">${p.title}</div>
          <div class="post-text">${p.content}</div>
        </div>

      </div>
    `;

  });

}

function addPost(){

  let t = document.getElementById("title").value.trim();
  let c = document.getElementById("content").value.trim();
  let i = document.getElementById("image").value.trim();

  if(!t || !c) return;

  posts.unshift({title:t, content:c, image:i});

  localStorage.setItem("posts", JSON.stringify(posts));

  document.getElementById("title").value = "";
  document.getElementById("content").value = "";
  document.getElementById("image").value = "";

  render();
}

function openImg(src){
  document.getElementById("lightbox").style.display = "flex";
  document.getElementById("bigimg").src = src;
}

function closeImg(){
  document.getElementById("lightbox").style.display = "none";
}

render();

</script>

</body>
</html>
